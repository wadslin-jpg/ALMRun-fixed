name: Build ALMRun (with shutdown fix)

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC x86
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Cache wxWidgets
      id: cache-wx
      uses: actions/cache@v4
      with:
        path: C:\wxWidgets
        key: wxwidgets-3.2.4-msvc-x86-static-v6

    - name: Download and extract wxWidgets source
      if: steps.cache-wx.outputs.cache-hit != 'true'
      shell: cmd
      run: |
        echo === Downloading wxWidgets 3.2.4 source zip ===
        curl -L -o "%TEMP%\wxwidgets.zip" "https://github.com/wxWidgets/wxWidgets/archive/refs/tags/v3.2.4.zip"
        if errorlevel 1 exit /b 1
        echo Downloaded:
        dir "%TEMP%\wxwidgets.zip"
        echo === Extracting with 7-Zip ===
        if exist C:\wxWidgets rmdir /S /Q C:\wxWidgets
        "C:\Program Files\7-Zip\7z.exe" x "%TEMP%\wxwidgets.zip" -oC:\ -y
        if errorlevel 1 exit /b 1
        if not exist "C:\wxWidgets-3.2.4" (
          echo ERROR: C:\wxWidgets-3.2.4 not found after extraction
          dir C:\ | findstr wxWidgets
          exit /b 1
        )
        ren "C:\wxWidgets-3.2.4" wxWidgets
        if not exist "C:\wxWidgets\build\msw\makefile.vc" (
          echo ERROR: makefile.vc not found
          exit /b 1
        )
        echo === wxWidgets source extracted successfully ===
        dir C:\wxWidgets\build\msw\makefile.vc

    - name: Build wxWidgets
      if: steps.cache-wx.outputs.cache-hit != 'true'
      shell: cmd
      env:
        WXWIN: C:\wxWidgets
      run: |
        cd /D C:\wxWidgets\build\msw
        echo === Building wxWidgets Release (static, Unicode) ===
        nmake -f makefile.vc BUILD=release SHARED=0 UNICODE=1 RUNTIME_LIBS=static CXXFLAGS=/MP CFLAGS=/MP
        if errorlevel 1 exit /b 1
        echo === wxWidgets build complete ===
        dir /b C:\wxWidgets\lib\vc_lib\*.lib 2>nul

    - name: Patch CMakeLists for modern toolset
      shell: bash
      run: |
        sed -i 's/set(CMAKE_VS_PLATFORM_TOOLSET v110_xp)/# Removed v110_xp for modern VS/' CMakeLists.txt || true
        echo "=== CMakeLists.txt (first 30 lines) ==="
        head -30 CMakeLists.txt

    - name: Configure CMake
      shell: cmd
      env:
        WXWIN: C:\wxWidgets
      run: |
        cmake -A Win32 -G "Visual Studio 17 2022" -DRTL=MT -DCMAKE_BUILD_TYPE=Release .

    - name: Build ALMRun
      shell: cmd
      run: |
        cmake --build . --config Release --parallel 2>&1
        echo === Build complete ===
        dir /s /b Release\ALMRun.exe 2>nul
        dir /s /b ALMRun.exe 2>nul

    - name: Package artifacts
      shell: bash
      run: |
        mkdir -p artifact
        # Find and copy the built exe
        EXE_PATH=$(find . -name "ALMRun.exe" -type f | head -1)
        if [ -z "$EXE_PATH" ]; then
          echo "ERROR: ALMRun.exe not found!"
          find . -name "*.exe" -type f
          exit 1
        fi
        echo "Found exe: $EXE_PATH"
        cp "$EXE_PATH" artifact/ALMRun.exe
        # Copy runtime dependencies
        cp bin/lua51.dll artifact/ 2>/dev/null || true
        cp third_party/Everything-SDK/dll/Everything32.dll artifact/ 2>/dev/null || true
        # Copy config and resources
        cp bin/ALMRun.ini artifact/ 2>/dev/null || true
        cp bin/ShortCutList.txt artifact/ 2>/dev/null || true
        cp -r bin/config artifact/ 2>/dev/null || true
        cp -r bin/LuaEx artifact/ 2>/dev/null || true
        cp -r bin/skin artifact/ 2>/dev/null || true
        echo "=== Artifact contents ==="
        ls -la artifact/

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ALMRun-fixed-windows
        path: artifact/
        retention-days: 90
