name: Build ALMRun (with shutdown fix)

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC x86
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Cache wxWidgets
      id: cache-wx
      uses: actions/cache@v4
      with:
        path: C:\wxWidgets
        key: wxwidgets-3.2.4-msvc-x86-static-v8

    - name: Clone wxWidgets with submodules
      if: steps.cache-wx.outputs.cache-hit != 'true'
      shell: cmd
      run: |
        echo === Cloning wxWidgets 3.2.4 with all submodules (PCRE2, nanosvg, etc.) ===
        if exist C:\wxWidgets rmdir /S /Q C:\wxWidgets
        git clone --branch v3.2.4 --depth 1 --recursive https://github.com/wxWidgets/wxWidgets.git C:\wxWidgets
        if errorlevel 1 exit /b 1
        if not exist "C:\wxWidgets\build\msw\makefile.vc" (
          echo ERROR: makefile.vc not found after clone
          exit /b 1
        )
        if not exist "C:\wxWidgets\3rdparty\pcre\src\pcre2_auto_possess.c" (
          echo ERROR: PCRE2 submodule not initialized - pcre2_auto_possess.c missing
          dir C:\wxWidgets\3rdparty\pcre\src\ 2>nul
          exit /b 1
        )
        echo === wxWidgets source with submodules ready ===
        echo PCRE2 check: 
        dir C:\wxWidgets\3rdparty\pcre\src\pcre2_auto_possess.c

    - name: Build wxWidgets
      if: steps.cache-wx.outputs.cache-hit != 'true'
      shell: cmd
      env:
        WXWIN: C:\wxWidgets
      run: |
        cd /D C:\wxWidgets\build\msw
        echo === Building wxWidgets Release (static, Unicode) ===
        nmake -f makefile.vc BUILD=release SHARED=0 UNICODE=1 RUNTIME_LIBS=static CXXFLAGS="/MP /std:c++17" CFLAGS=/MP
        if errorlevel 1 exit /b 1
        echo === wxWidgets build complete ===
        dir /b C:\wxWidgets\lib\vc_lib\*.lib 2>nul
        echo === Verifying setup.h ===
        if not exist "C:\wxWidgets\lib\vc_lib\mswu\wx\setup.h" (
          echo ERROR: setup.h not found at lib\vc_lib\mswu\wx\setup.h
          dir /s /b C:\wxWidgets\lib\vc_lib\*setup.h 2>nul
          exit /b 1
        )
        echo setup.h OK: 
        dir C:\wxWidgets\lib\vc_lib\mswu\wx\setup.h

    - name: Verify wxWidgets setup.h (always run, even on cache hit)
      shell: cmd
      env:
        WXWIN: C:\wxWidgets
      run: |
        echo === Checking setup.h locations ===
        if exist "C:\wxWidgets\lib\vc_lib\mswu\wx\setup.h" (
          echo FOUND: lib\vc_lib\mswu\wx\setup.h
          echo --- First 10 lines ---
          type "C:\wxWidgets\lib\vc_lib\mswu\wx\setup.h" | more +0 /e /c /t10
        ) else (
          echo NOT FOUND: lib\vc_lib\mswu\wx\setup.h
        )
        echo.
        if exist "C:\wxWidgets\include\msvc\wx\setup.h" (
          echo FOUND: include\msvc\wx\setup.h (redirect)
        ) else (
          echo NOT FOUND: include\msvc\wx\setup.h
        )
        echo.
        echo === Checking log.h ===
        if exist "C:\wxWidgets\include\wx\log.h" (
          echo log.h exists, showing first 25 lines:
          powershell -Command "Get-Content 'C:\wxWidgets\include\wx\log.h' -TotalCount 25"
        ) else (
          echo ERROR: log.h not found!
        )
        echo.
        echo === Checking built libs ===
        dir /b C:\wxWidgets\lib\vc_lib\wx*.lib 2>nul

    - name: Patch CMakeLists for modern toolset
      shell: bash
      run: |
        sed -i 's/set(CMAKE_VS_PLATFORM_TOOLSET v110_xp)/# Removed v110_xp for modern VS/' CMakeLists.txt || true
        echo "=== CMakeLists.txt (first 30 lines) ==="
        head -30 CMakeLists.txt

    - name: Configure CMake (Ninja generator, uses cl.exe from MSVC dev cmd)
      shell: cmd
      env:
        WXWIN: C:\wxWidgets
      run: |
        cmake -G Ninja -DRTL=MT -DCMAKE_BUILD_TYPE=Release -DCMAKE_VERBOSE_MAKEFILE=ON .

    - name: Build ALMRun
      shell: cmd
      run: |
        cmake --build . --parallel 2>&1
        echo === Build complete ===
        dir /s /b ALMRun.exe 2>nul

    - name: Package artifacts
      shell: bash
      run: |
        mkdir -p artifact
        # Find and copy the built exe
        EXE_PATH=$(find . -name "ALMRun.exe" -type f | head -1)
        if [ -z "$EXE_PATH" ]; then
          echo "ERROR: ALMRun.exe not found!"
          find . -name "*.exe" -type f
          exit 1
        fi
        echo "Found exe: $EXE_PATH"
        cp "$EXE_PATH" artifact/ALMRun.exe
        # Copy runtime dependencies
        cp bin/lua51.dll artifact/ 2>/dev/null || true
        cp third_party/Everything-SDK/dll/Everything32.dll artifact/ 2>/dev/null || true
        # Copy config and resources
        cp bin/ALMRun.ini artifact/ 2>/dev/null || true
        cp bin/ShortCutList.txt artifact/ 2>/dev/null || true
        cp -r bin/config artifact/ 2>/dev/null || true
        cp -r bin/LuaEx artifact/ 2>/dev/null || true
        cp -r bin/skin artifact/ 2>/dev/null || true
        echo "=== Artifact contents ==="
        ls -la artifact/

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ALMRun-fixed-windows
        path: artifact/
        retention-days: 90
